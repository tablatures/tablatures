name: Release on version bump

# Cuts a release only when package.json's version changes on main. Bump the
# version in a PR, merge it, and this tags v<version> and kicks off the signed
# Android build; pushes that do not change the version never release.

on:
  push:
    branches: [main]
    paths:
      - package.json

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version
        id: v
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Tag and trigger the release when the version is new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.v.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists; nothing to release."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          # A tag pushed with GITHUB_TOKEN does not trigger other workflows, so
          # dispatch the release build explicitly against the new tag.
          gh workflow run android-release.yml --ref "${TAG}"
          echo "Tagged ${TAG} and dispatched the Android release build."
