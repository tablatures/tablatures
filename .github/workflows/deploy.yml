name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production
          ## Set these secrets in repo Settings > Secrets > Actions:
          ##   SEARCH_API_BASE_URL = https://tablatures-api.vercel.app
          ##   SEARCH_API_TIMEOUT = 30000
          VITE_SEARCH_API_BASE_URL: ${{ secrets.SEARCH_API_BASE_URL }}
          VITE_SEARCH_API_TIMEOUT: ${{ secrets.SEARCH_API_TIMEOUT }}
          VITE_DEPLOY_TARGET: ${{ secrets.DEPLOY_TARGET }}
          VITE_BASE_PATH: ${{ secrets.BASE_PATH }}

      - name: Create 404.html for SPA routing
        run: cp build/index.html build/404.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'build/'

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
